name: Weekly legislators refresh

on:
  schedule:
    - cron: '0 8 * * 1' # Mondays 08:00 UTC
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: data-sync
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Refresh legislators + district offices + ZIP map
        run: python3 scripts/process-data.py --download
      - name: Commit data
        id: commit
        run: |
          git config user.name "cabina-sync[bot]"
          git config user.email "noreply@github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "no changes"
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "changed=true" >> "$GITHUB_OUTPUT"
          git commit -m "chore(data): weekly legislators refresh $(date -u +%F)"
          # The scheduled run's checked-out base can be stale by the time this
          # job starts (queued behind sync-bills.yml in the shared data-sync
          # concurrency group, whose push lands after our SHA was resolved -
          # the 2026-06-22 failure). Rebase onto the latest main and retry;
          # safe because this workflow only ever touches legislators.json /
          # zip-districts.json, disjoint from sync-bills.yml's files.
          for i in 1 2 3 4 5; do
            git push && exit 0
            echo "push rejected, rebasing onto latest main (attempt $i)"
            git fetch origin main
            git rebase origin/main
          done
          exit 1
      - name: Trigger Vercel deploy
        # Commits authored by this bot have no linked Vercel account, so
        # Vercel's GitHub integration silently BLOCKs the auto-deploy it would
        # normally trigger on push (every nightly/weekly sync commit did this,
        # unnoticed, until a later human-merged PR happened to rebuild main
        # and drag the data along). Deploy hooks aren't identity-gated.
        if: steps.commit.outputs.changed == 'true'
        run: curl -fsS -X POST "${{ secrets.VERCEL_DEPLOY_HOOK_URL }}"
