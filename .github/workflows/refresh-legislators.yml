name: Weekly legislators refresh

on:
  schedule:
    - cron: '0 8 * * 1' # Mondays 08:00 UTC
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: data-sync
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Refresh legislators + district offices + ZIP map
        run: python3 scripts/process-data.py --download
      - name: Commit data
        run: |
          git config user.name "cabina-sync[bot]"
          git config user.email "noreply@github.com"
          git add data/
          git diff --cached --quiet && echo "no changes" && exit 0
          git commit -m "chore(data): weekly legislators refresh $(date -u +%F)"
          # The scheduled run's checked-out base can be stale by the time this
          # job starts (queued behind sync-bills.yml in the shared data-sync
          # concurrency group, whose push lands after our SHA was resolved -
          # the 2026-06-22 failure). Rebase onto the latest main and retry;
          # safe because this workflow only ever touches legislators.json /
          # zip-districts.json, disjoint from sync-bills.yml's files.
          for i in 1 2 3 4 5; do
            git push && exit 0
            echo "push rejected, rebasing onto latest main (attempt $i)"
            git fetch origin main
            git rebase origin/main
          done
          exit 1
