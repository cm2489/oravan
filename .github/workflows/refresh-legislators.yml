name: Weekly legislators refresh

on:
  schedule:
    - cron: '0 8 * * 1' # Mondays 08:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  # Needed for the "newly detected vacancy" issue below AND the
  # redistricting-watch issue (gh issue create with the workflow's own
  # automatic GITHUB_TOKEN) - a normal, expected vacancy or map-page change
  # must never commit/pass silently, so these open labeled issues instead of
  # failing the run. No new secret, no scope change to GITHUB_FEEDBACK_TOKEN
  # (that PAT stays issues-only for the beta-feedback route and is unrelated
  # to this).
  issues: write

concurrency:
  group: data-sync
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        # Only for the redistricting-watch + rollover-tripwire steps below
        # (scripts/check-redistricting-watch.mjs, scripts/check-rollover-
        # tripwire.mjs). Both are stdlib-only (Node 18+'s global fetch, no
        # npm package), so no `npm ci` here - same "the runner's node
        # suffices" posture as scripts/verify-deploy.mjs.
        with:
          node-version: 24
      - name: Refresh legislators + district offices + ZIP map (vacancy-diff included)
        id: refresh
        # scripts/process-data.py now also derives data/vacancies.json - see
        # scripts/vacancy_diff.py for the derivation (seat-set diff against
        # the currently-committed legislators.json + vacancies.json, never a
        # single legislator's own stale term data - the footgun this
        # replaces) and scripts/test_vacancy_diff.py for its fixtures.
        #
        # Loud-failure design, matching the dead-man's-switch pattern
        # scripts/verify-sync.mjs already uses for sync-bills.yml (fail
        # before commit on a severe, corruption-shaped drop; this workflow
        # adds a second, non-blocking channel for the normal case):
        #   - a handful of newly-detected vacancies (<= 5 in one run) is
        #     real, expected churn - the run does NOT fail, but the
        #     "Open an issue" step below surfaces it loudly instead of
        #     letting it commit silently.
        #   - more than 5 new vacancies in one run is treated as a
        #     truncated/broken upstream fetch, not reality (docs/ideation/
        #     2026-07-05-build-gtm-strategy.md §9.1(f)) - process-data.py
        #     exits 1 here, so nothing below this step runs and nothing
        #     commits.
        run: python3 scripts/process-data.py --download
      - name: Open an issue for newly detected vacancies
        # Only for the non-anomalous case (the step above already failed
        # and skipped everything downstream if it was anomalous). Each
        # newly-detected seat gets its own issue so it's easy to close
        # independently once a successor is sworn in; a chronic vacancy
        # already on record from a prior run is never re-filed (process-
        # data.py only reports the seats first observed vacant THIS run).
        if: steps.refresh.outputs.anomalous_vacancy_shrink == 'false' && steps.refresh.outputs.newly_detected_vacancies != '[]'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VACANCIES: ${{ steps.refresh.outputs.newly_detected_vacancies }}
        run: |
          echo "$VACANCIES" | jq -c '.[]' | while read -r v; do
            state=$(echo "$v" | jq -r '.state')
            district=$(echo "$v" | jq -r '.district')
            gh issue create \
              --repo cm2489/oravan \
              --title "Vacant seat detected: ${state}-${district}" \
              --label data-vacancy \
              --body "The weekly legislators refresh found no current representative for ${state} district ${district} in this week's pull. This is never silently backfilled from the departed member's stale record - rep-lookup surfaces (reps page, /api/reps, MCP lookup_representatives) now show an explicit vacant-seat state for this district instead. Close this once a successor is sworn in and data/vacancies.json no longer lists the seat (it heals automatically on the next refresh once the new member appears in the upstream feed)."
          done
      - name: Poll Redistricting Data Hub for tracked-state map changes
        id: redistricting_watch
        # S24, §9.1(f) item 3 - see lib/redistricting-watch.mjs and
        # docs/solutions/two-clock-district-boundaries.md for the full
        # design record. RDH publishes no RSS/JSON/API for its "What's New"
        # page (verified live 2026-07-06) - this polls the per-state
        # <lastmod> in RDH's own WordPress XML sitemap instead: real,
        # scoped to exactly the tracked states, machine-parseable, and
        # explicitly a TRIPWIRE (not a status feed) - a lastmod change means
        # "a human should go read what changed," never an automated status
        # update. Loud-failure posture matches vacancy_diff.py: fails (exit
        # 1, no baseline update) only if every tracked state comes back
        # missing (RDH restructured the sitemap, or the fetch itself broke)
        # - not real news.
        run: node scripts/check-redistricting-watch.mjs
      - name: Open an issue for each changed redistricting-watch state
        # Only for the non-anomalous case (the step above already failed and
        # skipped everything downstream if every tracked state came back
        # missing). One issue per changed state, matching the vacancy-issue
        # pattern above - the committed rdh_lastmod baseline has already
        # advanced (inside check-redistricting-watch.mjs), so an
        # already-flagged change is never re-filed on a later run.
        if: steps.redistricting_watch.outputs.anomalous == 'false' && steps.redistricting_watch.outputs.changed_states != '[]'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CHANGED: ${{ steps.redistricting_watch.outputs.changed_states }}
        run: |
          echo "$CHANGED" | jq -c '.[]' | while read -r c; do
            state=$(echo "$c" | jq -r '.state')
            url=$(echo "$c" | jq -r '.url')
            prev=$(echo "$c" | jq -r '.prevLastmod')
            new=$(echo "$c" | jq -r '.newLastmod')
            gh issue create \
              --repo cm2489/oravan \
              --title "Redistricting watch: ${state} map page changed on RDH" \
              --label redistricting-watch \
              --body "Redistricting Data Hub's page for ${state} (${url}) changed - lastmod moved from ${prev} to ${new}. This is a tripwire, not an automated status read: open the page, see what actually changed, and update data/redistricting-watch.json's status/note for ${state} accordingly. (The baseline lastmod in that file has already advanced this run, so this same change will not re-fire next week.)"
          done
      - name: 119th -> 120th Congress rollover tripwire
        # S24, two-clock model (docs/solutions/two-clock-district-
        # boundaries.md). Non-blocking by design: the mandatory literal +
        # dataset bump isn't due until Jan 3, 2027, so this only starts a
        # loud ::warning once real lead time is needed (~2026-12-01) rather
        # than failing the pipeline for a month first. See
        # lib/rollover-tripwire.mjs.
        run: node scripts/check-rollover-tripwire.mjs
      - name: Commit data
        id: commit
        # The author email must map to the Vercel-linked GitHub account
        # (cm2489): Vercel BLOCKs auto-deploys for commits from unlinked
        # authors, and — proven by the 2026-07-02 nightly run — deploy hooks
        # do NOT bypass that check; the hook's deployment of the same commit
        # was BLOCKED identically. Authoring as the linked account lets the
        # normal git-integration deploy proceed.
        # See docs/solutions/vercel-bot-push-blocked-deploys.md.
        run: |
          git config user.name "oravan-sync"
          git config user.email "223600121+cm2489@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "no changes"
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "changed=true" >> "$GITHUB_OUTPUT"
          git commit -m "chore(data): weekly legislators refresh $(date -u +%F)"
          # The scheduled run's checked-out base can be stale by the time this
          # job starts (queued behind sync-bills.yml in the shared data-sync
          # concurrency group, whose push lands after our SHA was resolved -
          # the 2026-06-22 failure). Rebase onto the latest main and retry;
          # safe because this workflow only ever touches legislators.json /
          # zip-districts.json / vacancies.json / redistricting-watch.json,
          # disjoint from sync-bills.yml's files.
          for i in 1 2 3 4 5; do
            if git push; then
              echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "push rejected, rebasing onto latest main (attempt $i)"
            git fetch origin main
            git rebase origin/main
          done
          exit 1
      - name: Verify the deploy landed
        # The push above triggers Vercel's git-integration deploy (the commit
        # author is linked, so it is no longer BLOCKED). Deploys can still fail
        # or be dropped silently (PR #18's root cause hid for weeks behind
        # green checkmarks) - poll production until it serves the SHA we just
        # pushed. Skips with a notice until the PROD_URL repo variable is set.
        # Stdlib-only script: needs no npm ci, the runner's node suffices.
        if: steps.commit.outputs.changed == 'true'
        env:
          PROD_URL: ${{ vars.PROD_URL }}
          EXPECT_SHA: ${{ steps.commit.outputs.sha }}
        run: node scripts/verify-deploy.mjs
