name: Nightly bill sync

on:
  schedule:
    - cron: '30 7 * * *' # 07:30 UTC = 3:30am ET, after Congress.gov's own update cycle
  workflow_dispatch:
    inputs:
      max_new_decodes:
        description: 'Max new bills to AI-decode this run'
        default: '40'

permissions:
  contents: write

concurrency:
  group: data-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Sync bills
        env:
          CONGRESS_API_KEY: ${{ secrets.CONGRESS_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          MAX_NEW_DECODES: ${{ inputs.max_new_decodes || '40' }}
        run: node scripts/sync-bills.mjs
      - name: Sync coverage
        # No-op unless NEWS_API_KEY is set, so this is safe before the secret exists.
        env:
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/sync-coverage.mjs
      - name: Commit data
        id: commit
        run: |
          git config user.name "cabina-sync[bot]"
          git config user.email "noreply@github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "no changes"
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "changed=true" >> "$GITHUB_OUTPUT"
          git commit -m "chore(data): nightly bill sync $(date -u +%F)"
          # The scheduled run's checked-out base can be stale by the time this
          # job starts (queued behind refresh-legislators.yml in the shared
          # data-sync concurrency group, whose push lands after our SHA was
          # resolved - the 2026-06-22 failure, there in the other workflow).
          # Rebase onto the latest main and retry; safe because this workflow
          # only touches bills.json/bills-es.json/sync-state.json, disjoint
          # from refresh-legislators.yml's files.
          for i in 1 2 3 4 5; do
            git push && exit 0
            echo "push rejected, rebasing onto latest main (attempt $i)"
            git fetch origin main
            git rebase origin/main
          done
          exit 1
      - name: Trigger Vercel deploy
        # Commits authored by this bot have no linked Vercel account, so
        # Vercel's GitHub integration silently BLOCKs the auto-deploy it would
        # normally trigger on push (every nightly/weekly sync commit did this,
        # unnoticed, until a later human-merged PR happened to rebuild main
        # and drag the data along). Deploy hooks aren't identity-gated.
        if: steps.commit.outputs.changed == 'true'
        run: curl -fsS -X POST "${{ secrets.VERCEL_DEPLOY_HOOK_URL }}"
