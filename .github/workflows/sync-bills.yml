name: Nightly bill sync

on:
  schedule:
    - cron: '30 7 * * *' # 07:30 UTC = 3:30am ET, after Congress.gov's own update cycle
  workflow_dispatch:
    inputs:
      max_new_decodes:
        description: 'Max new bills to AI-decode this run'
        default: '40'

permissions:
  contents: write

concurrency:
  group: data-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Mark run start
        # Consumed by the post-sync verifier: sync-state.json's lastRun must
        # advance past this timestamp or the night's run didn't do its job.
        id: runstart
        run: echo "ts=$(date -u +%FT%TZ)" >> "$GITHUB_OUTPUT"
      - name: Sync bills
        env:
          CONGRESS_API_KEY: ${{ secrets.CONGRESS_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          MAX_NEW_DECODES: ${{ inputs.max_new_decodes || '40' }}
        run: node scripts/sync-bills.mjs
      - name: Backfill coverage search inputs
        # Drains press_names/news_query for bills decoded before search-input
        # generation existed (~1,090 at introduction; 835 left after night one,
        # ≈2 nights at this budget), then becomes a fast no-op sweeping decode-time
        # misses. Runs BEFORE the coverage sync so tonight's queries benefit.
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BACKFILL_LIMIT: 450
        run: node scripts/backfill-search-inputs.mjs
      - name: Sync coverage
        # No-op unless NEWS_API_KEY is set, so this is safe before the secret exists.
        env:
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/sync-coverage.mjs
      - name: Verify the sync did its job (dead-man's-switch)
        # Fails loudly BEFORE anything is committed: corpus parses, EN/ES
        # parity holds, the bill count didn't drop, and sync-state advanced
        # tonight. Warns (never fails) on corpus staleness while the decode
        # backlog drains. See scripts/verify-sync.mjs and docs/solutions/.
        env:
          RUN_STARTED_AT: ${{ steps.runstart.outputs.ts }}
        run: node scripts/verify-sync.mjs
      - name: Verify rate-limit salt age (dead-man's-switch)
        # Loud failure if the counters database's hashing salt outlived its
        # 24h TTL, lost its TTL, or got corrupted - silent rotation failure
        # would turn short-lived rate-limit counters into stable identifiers
        # (S11/F5). Skips with a ::warning until the two counter secrets are
        # added to Actions; see scripts/verify-salt.mjs.
        env:
          UPSTASH_COUNTERS_REST_URL: ${{ secrets.UPSTASH_COUNTERS_REST_URL }}
          UPSTASH_COUNTERS_REST_TOKEN: ${{ secrets.UPSTASH_COUNTERS_REST_TOKEN }}
        run: node scripts/verify-salt.mjs
      - name: Commit data
        id: commit
        # The author email must map to the Vercel-linked GitHub account
        # (cm2489): Vercel BLOCKs auto-deploys for commits from unlinked
        # authors, and — proven by the 2026-07-02 nightly run — deploy hooks
        # do NOT bypass that check; the hook's deployment of the same commit
        # was BLOCKED identically. Authoring as the linked account lets the
        # normal git-integration deploy proceed.
        # See docs/solutions/vercel-bot-push-blocked-deploys.md.
        run: |
          git config user.name "rostra-sync"
          git config user.email "223600121+cm2489@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "no changes"
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "changed=true" >> "$GITHUB_OUTPUT"
          git commit -m "chore(data): nightly bill sync $(date -u +%F)"
          # The scheduled run's checked-out base can be stale by the time this
          # job starts (queued behind refresh-legislators.yml in the shared
          # data-sync concurrency group, whose push lands after our SHA was
          # resolved - the 2026-06-22 failure, there in the other workflow).
          # Rebase onto the latest main and retry; safe because this workflow
          # only touches bills.json/bills-es.json/sync-state.json, disjoint
          # from refresh-legislators.yml's files.
          for i in 1 2 3 4 5; do
            if git push; then
              echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "push rejected, rebasing onto latest main (attempt $i)"
            git fetch origin main
            git rebase origin/main
          done
          exit 1
      - name: Verify the deploy landed
        # The push above triggers Vercel's git-integration deploy (the commit
        # author is linked, so it is no longer BLOCKED). Deploys can still fail
        # or be dropped silently (PR #18's root cause hid for weeks behind
        # green checkmarks) - poll production until it serves the SHA we just
        # pushed. Skips with a notice until the PROD_URL repo variable is set.
        if: steps.commit.outputs.changed == 'true'
        env:
          PROD_URL: ${{ vars.PROD_URL }}
          EXPECT_SHA: ${{ steps.commit.outputs.sha }}
        run: node scripts/verify-deploy.mjs
      - name: Pre-generate top-band call scripts (S21, F7 - dark until armed)
        # Nightly pregen of the top-10 "Act now" bills' call scripts
        # (strategy §9.1(d)): writes straight into the S11 cache database
        # with build-time secrets, never through /api/script (F7 - a public
        # pregen flag is explicitly ruled out; app/api/script/route.ts stays
        # unaware pregen exists, grep-enforced in CI). Shipped dark: gated on
        # the PREGEN_ENABLED repo variable so this spends $0 until the owner
        # explicitly arms it (see the introducing PR's Arming checklist).
        # Must run via tsx, not plain node - see scripts/pregen-scripts.mjs.
        env:
          PREGEN_ENABLED: ${{ vars.PREGEN_ENABLED }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          UPSTASH_CACHE_REST_URL: ${{ secrets.UPSTASH_CACHE_REST_URL }}
          UPSTASH_CACHE_REST_TOKEN: ${{ secrets.UPSTASH_CACHE_REST_TOKEN }}
        run: |
          if [ "$PREGEN_ENABLED" != "true" ]; then
            echo "::notice::pregen SKIPPED - repo variable PREGEN_ENABLED is not 'true'. \$0 spent tonight. See the S21 PR's Arming checklist to turn this on."
            exit 0
          fi
          npx tsx scripts/pregen-scripts.mjs
