name: CI

on:
  pull_request:
  push:
    branches: [main]

# A newer push to the same PR cancels its still-running CI: only the latest
# commit — the one the merge gate actually checks — needs to finish, so runs on
# superseded commits stop instead of burning minutes to completion. Scoped to
# PRs only: cancel-in-progress is false for pushes to main, so every post-merge
# run (the production safety net, incl. the nightly data-sync commits) always
# runs to completion and is never interrupted.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Vacancy-diff unit tests (departed-member / vacant-no-successor / anomalous-shrink)
        # Stdlib-only (unittest) - no pip install needed, ubuntu-latest ships python3.
        run: cd scripts && python3 -m unittest test_vacancy_diff -v
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: EN/ES message-key parity (bilingual hard rule)
        run: node scripts/check-messages-parity.mjs
      - name: Zero-survivor naming gate (retired names; self-tests before scanning)
        # Exemptions are founder-decided in writing only — docs/migration/decisions.md.
        run: node scripts/check-naming.mjs
      - name: public/ ships only allowlisted files
        run: node scripts/check-public-allowlist.mjs
      - name: MCP registry server.json validates (S12; self-tests before scanning)
        run: |
          node scripts/check-server-json.mjs --self-test
          node scripts/check-server-json.mjs
      - name: Upstash key-namespace privacy gate (counters never see content, cache never sees callers, embed-domain sees neither)
        # Self-test first: the gate must prove it still catches its seeded
        # violations before its "clean" verdict on the tree means anything.
        run: |
          node scripts/check-key-namespaces.mjs --self-test
          node scripts/check-key-namespaces.mjs
      - name: Embed no-fingerprinting/no-analytics static gate
        # Same self-test-first convention as the key-namespace gate above.
        run: |
          node scripts/check-embed-fingerprinting.mjs --self-test
          node scripts/check-embed-fingerprinting.mjs
      - run: npm run typecheck
      - run: npm run lint
      - name: Detect docs-only PR diff (founder-approved fast path, 2026-07-07)
        # PRs whose entire diff is docs/** or *.md skip the E2E build below.
        # Conservative on purpose: any other path (code, messages, configs,
        # this workflow itself) runs the full pipeline, and every push to
        # main still runs the full suite regardless — the fast path only
        # shortens PR iteration, never the post-merge safety net.
        id: paths
        run: |
          DOCS_ONLY=false
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch --quiet origin "${{ github.event.pull_request.base.sha }}"
            CHANGED=$(git diff --name-only "${{ github.event.pull_request.base.sha }}" HEAD)
            echo "$CHANGED"
            if [ -n "$CHANGED" ] && ! echo "$CHANGED" | grep -qvE '^docs/|\.md$'; then
              DOCS_ONLY=true
            fi
          fi
          echo "docs_only=$DOCS_ONLY" >> "$GITHUB_OUTPUT"
          echo "docs_only=$DOCS_ONLY"
      - name: Resolve Playwright version (browser-cache key)
        id: pw
        if: steps.paths.outputs.docs_only != 'true'
        run: echo "version=$(node -p "require('@playwright/test/package.json').version")" >> "$GITHUB_OUTPUT"
      - name: Cache Playwright WebKit browser
        # Version-keyed, so a cache hit is ALWAYS the browser this Playwright
        # build expects — no mismatch risk. A miss just re-downloads (slower,
        # never wrong). The install step below still runs, so --with-deps system
        # libraries are always installed fresh; only the binary download is saved.
        if: steps.paths.outputs.docs_only != 'true'
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.pw.outputs.version }}
      - name: Cache Next.js build cache
        # Next content-validates .next/cache against each input file's hash, so a
        # stale restore only ever forces a rebuild — it can never yield a wrong
        # build or a page that doesn't reflect current source. Keyed per-commit
        # (always saves a fresh entry) with a lockfile-scoped restore-key so a
        # new commit still starts from the most recent warm cache.
        if: steps.paths.outputs.docs_only != 'true'
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: nextjs-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-${{ github.sha }}
          restore-keys: |
            nextjs-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-
      - name: Install Playwright WebKit
        if: steps.paths.outputs.docs_only != 'true'
        run: npx playwright install --with-deps webkit
      - name: E2E (builds the app via webServer)
        if: steps.paths.outputs.docs_only != 'true'
        run: npx playwright test
      - uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-traces
          path: test-results/
          retention-days: 7
