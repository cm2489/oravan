name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Launch-gate reminder (noindex is active)
        # Never fails - it just refuses to let the gate be forgotten. The
        # noindex is kept deliberately (per Colby, 2026-07-01); remove the
        # gate in app/[locale]/layout.tsx AND this step at launch.
        run: |
          if grep -q 'index: false' 'app/[locale]/layout.tsx'; then
            echo "::warning title=noindex launch gate is active::Production is not indexable (robots noindex in app/[locale]/layout.tsx). Kept per Colby, 2026-07-01 - revisit at launch."
          fi
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: EN/ES message-key parity (bilingual hard rule)
        run: node scripts/check-messages-parity.mjs
      - name: public/ ships only allowlisted files
        run: node scripts/check-public-allowlist.mjs
      - run: npm run lint
      - name: Install Playwright WebKit
        run: npx playwright install --with-deps webkit
      - name: E2E (builds the app via webServer)
        run: npx playwright test
      - uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-traces
          path: test-results/
          retention-days: 7
